# nginx-config för AVA static web-app.
#
# Next.js byggs med DEMO_BASE_PATH=/ava → alla asset-URLs börjar med /ava/
# men filerna ligger på rot-nivå i `out/`. Vi använder `alias` för att
# mappa URL-prefixet → katalog:n.

server {
  listen 80;
  server_name _;

  index index.html;

  # /ava/_next/static/ — Next.js hash:ade chunks, cache aggressivt
  location /ava/_next/static/ {
    alias /usr/share/nginx/html/_next/static/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Allt under /ava/ — strippa prefix, serva static, fall till .html
  # Notera: /ava/ → index.html, /ava/foo → /foo eller /foo.html eller /foo/index.html
  location /ava/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri.html $uri/index.html /index.html =404;
  }

  # Root → redirect till /ava/
  location = / {
    return 302 /ava/;
  }

  # Hindra dolda dot-files
  location ~ /\. {
    deny all;
  }
}
