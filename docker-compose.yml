# AVA Tier 3 — tunn backend.
#
# Arkitektur:
#   Browser (klient)
#     │
#     ├─ HTTP → nginx (port 8080)  — servar static web-app
#     └─ SSH  → sshd  (port 2222)  — bare git-repos = all datalagring
#
# Klienten gör allt jobb (FSA + isomorphic-git). Servern är bara två
# tunna lager: filserver för web-app:n + git-server för data. Ingen
# databas, ingen LLM, ingen text-extraktion på serversidan.
#
# Setup:
#   1. Bygg web-app:n statiskt:  bash scripts/build-demo.sh
#   2. Lägg din SSH-nyckel i:    docker/git-ssh/authorized_keys
#                                (cat ~/.ssh/id_ed25519.pub >> ...)
#   3. Starta:                   docker compose up -d --build
#   4. Browser:                  http://localhost:8080/ava
#   5. Klona repo:                git clone ssh://git@localhost:2222/srv/git/firma.git

services:
  # ─── Statisk web-app (Next.js export under ./out) ─────────
  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./out:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/ava/"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── SSH + bare git-repos = datalagring ────────────────────
  git-ssh:
    build:
      context: ./docker/git-ssh
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "2222:22"
    volumes:
      - git_repos:/srv/git
      - ./docker/git-ssh/authorized_keys:/keys/authorized_keys:ro

volumes:
  # Persistent storage för bare git-repos. Backup = `tar` på denna volym.
  git_repos:
