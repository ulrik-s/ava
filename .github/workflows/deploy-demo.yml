name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Opta in action-runtimes på Node 24 (annars Node 20-deprecation, EOL 2026-09-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Bara en deploy åt gången — om en ny push kommer in mitt i, avbryt
# den tidigare så vi inte krockar i out/-mappen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: yarn install --immutable

      # Bygger appen som statisk export OCH seedar demo-data direkt i out/.
      # build-demo.sh kör:
      #   1. next build (DEMO_BUILD=1) → out/
      #   2. tsx tooling/scripts/build-demo-repo.ts --dir out  (seed-data)
      #   3. tsx tooling/scripts/generate-demo-manifest.ts out (manifest.json)
      #   4. touch out/.nojekyll (så .ava/-mappar serveras av Pages)
      - name: Build demo (app + seeded data)
        env:
          DEMO_BUILD: "1"
          NEXT_PUBLIC_DEMO_BUILD: "1"
          # Bas-sökväg matchar repo:t (t.ex. "/ava-demo") så assets + data
          # serveras från rätt path.
          DEMO_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # Tala om för app:en att data lever på samma origin/repo som den
          # själv. Annars defaultar firma-config till ulrik-s/ava-demo →
          # CORS-fel + tom data. Båda env-namnen sätts eftersom olika filer
          # läser olika varianter (NEXT_PUBLIC_DEMO_REPO i firma-config.ts;
          # NEXT_PUBLIC_DEFAULT_DEMO_REPO i search/demo/document-row).
          NEXT_PUBLIC_DEMO_REPO: ${{ github.repository }}
          NEXT_PUBLIC_DEFAULT_DEMO_REPO: ${{ github.repository }}
          # Versionera OPFS-demo-cachen per deploy → användare ser ny data
          # utan att manuellt rensa OPFS (annars serverar restoreFromCache
          # en gammal snapshot tills den rensas).
          NEXT_PUBLIC_DEMO_VERSION: ${{ github.sha }}
        run: bash tooling/scripts/build-demo.sh

      - name: Sanity check — manifest + binärfiler
        run: |
          test -f out/manifest.json || (echo "manifest.json saknas!" && exit 1)
          test -f out/.nojekyll || (echo ".nojekyll saknas!" && exit 1)
          test -f out/404.html || (echo "404.html saknas (SPA-fallback)!" && exit 1)
          docs=$(find out/documents/content -type f 2>/dev/null | wc -l | tr -d ' ')
          if [ "$docs" -lt 30 ]; then
            echo "Förväntade ≥30 PDF/DOCX-filer, fick $docs"
            exit 1
          fi
          # Kritiska sidor som måste finnas som pre-renderade HTML — Next 16
          # static export kräver det för dynamic routes; client-side nav till
          # okända params funkar inte. Seed-IDs har 1 HTML var, plus
          # __shell__ för runtime-skapade entiteter.
          test -f out/index.html || (echo "out/index.html saknas!" && exit 1)
          test -f out/404.html || (echo "out/404.html saknas (SPA-fallback)!" && exit 1)
          for route in calendar contacts invoices payment-plans matters search settings; do
            if [ ! -f "out/$route/index.html" ]; then
              echo "out/$route/index.html saknas!"
              exit 1
            fi
          done
          for route in matters contacts invoices payment-plans; do
            if [ ! -f "out/$route/__shell__/index.html" ]; then
              echo "out/$route/__shell__/index.html saknas (sentinel-shell för okända id:n)!"
              exit 1
            fi
          done
          echo "✓ Sanity check OK — $docs dokumentfiler, manifest finns, route-HTML:er finns."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
