name: Helper release

# Triggas av tag som börjar med "helper-v" (helper-v1.0.0, helper-v1.2.3…).
# Prefix så helper-releaser inte krockar med eventuella web-app-releaser
# i samma monorepo. Bygger 5 fristående Bun-binärer + checksums och
# laddar upp dem till en GitHub-release. (Ersätter GoReleaser, #78.)
on:
  push:
    tags:
      - "helper-v*"

permissions:
  contents: write # för att ladda upp release-artefakter

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: helper-app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Cross-build
        run: bun build.ts "${GITHUB_REF#refs/tags/}"

      - name: Checksums
        run: |
          cd dist
          sha256sum ava-helper-* > "ava-helper_${GITHUB_REF#refs/tags/}_checksums.txt"
          ls -lh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: helper-app/dist/*
          fail_on_unmatched_files: true
          body: |
            AVA Helper auto-uppdaterar sig en gång per dygn — den här releasen
            plockas upp automatiskt av befintliga installationer (#78).
