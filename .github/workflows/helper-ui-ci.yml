name: Helper UI CI

# Typecheck + test för helper-ui (Electron-tray-app med in-process-motor,
# ADR 0029/0030) vid varje PR som rör dess kod. Täcker de Electron-fria
# logik-modulerna + motorn (src/engine/); interaktiv tray/login + paketering
# (electron-builder) verifieras på mål-datorn.
on:
  push:
    branches: [main]
    paths:
      - "helper-ui/**"
      - "src/lib/shared/helper/**"
      - "src/lib/shared/http/**"
      - ".github/workflows/helper-ui-ci.yml"
  pull_request:
    paths:
      - "helper-ui/**"
      - "src/lib/shared/helper/**"
      - "src/lib/shared/http/**"
      - ".github/workflows/helper-ui-ci.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: helper-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test + coverage-grind
        # bunfig.toml: coverage=true + coverageThreshold (ratchet).
        run: bun test

      - name: Bundle (smoke)
        # Verifierar att Electron-main:en buntlar rent (alias/.ts/imports löser).
        # Paketering (electron-builder → .app/.exe) körs i release, ej här.
        run: bun run bundle
