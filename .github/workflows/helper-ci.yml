name: Helper CI

# Typecheck + test + cross-build för helper-app (TS/Bun) vid varje PR
# som rör helper-koden. (Go → TS, #78.)
on:
  push:
    branches: [main]
    paths:
      - "helper-app/**"
      - "src/lib/shared/helper/**"
      - ".github/workflows/helper-ci.yml"
  pull_request:
    paths:
      - "helper-app/**"
      - "src/lib/shared/helper/**"
      - ".github/workflows/helper-ci.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: helper-app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test + coverage-grind
        # bunfig.toml har coverage=true + coverageThreshold → faller om
        # täckningen sjunker under golvet (ratchet).
        run: bun test

      - name: Cross-build (snapshot)
        run: |
          bun build.ts snapshot
          ls -lh dist/
