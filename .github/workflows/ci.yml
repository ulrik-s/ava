name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch: # för on-demand e2e (git round-trip)

# Bun (#91) är pakethanterare + script-runner. setup-bun ger `bun` på PATH
# (kör `bun install --frozen-lockfile` + `bun run X` + `bun *.ts`-scripten);
# setup-node behålls för att tool-binärerna (tsc/eslint/vitest/next/playwright)
# körs under Node via sin shebang.
#
# OBS: AVA är git-first — ingen Prisma, Postgres, NextAuth, Meilisearch
# eller Tika i stacken. CI speglar därför bara den faktiska stacken:
# statisk analys + vitest (+ git-round-trip-e2e mot docker).

jobs:
  # ───────────────── Commit-meddelanden ─────────────────
  # Speglar den lokala .husky/commit-msg-hooken i CI: alla commits i en PR
  # måste följa Conventional Commits (skydd om någon committat utan hooken).
  commitlint:
    name: Commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # commitlint behöver hela historiken för --from..--to
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}"

  # ───────────────── Statisk analys ─────────────────
  static:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      # Ratchet med ventil (#41): struktur-reglerna (max-lines/-depth/-params/
      # -nested-callbacks + complexity) är `error`. Befintlig skuld ligger i
      # eslint-suppressions.json (43 poster); --max-warnings 0 fäller alla NYA
      # warnings OCH oavsedda warning-regler. Skulden betas av via `yarn
      # lint:prune` när en lång funktion bryts ut. Se docs/quality.md.
      - run: bun run lint --max-warnings 0
      # Enforcing #40 + #199: src/lib, src/app + src/components hålls strikt på
      # complexity@8 — inga complexity-undantag (inline-disable/suppressions).
      # Se docs/quality.md.
      - run: bun run lint:complexity-strict
      - run: bun run deps:check
      # Gating: fäller på strukturfynd (döda filer, oanvända/olistade deps).
      # Export-/typ-fynd är "warn" i knip.json (rådgivande) tills #3/#4 städat dem.
      - run: bun run knip
      - run: bun run duplicates
      - name: Upload jscpd report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jscpd-report
          path: reports/jscpd/

  # ───────── Unit + komponent + integration ─────────
  # Allt mockar sina beroenden / kör mot in-memory DemoDataStore — inga
  # externa tjänster behövs.
  unit:
    name: Unit / komponent / integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # bun test --isolate (#92) + coverage-ratchet (rader/funktioner).
      - run: bun run test:cov
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/

  # ───────────────── Repository (Postgres) ─────────────────
  # Kör Drizzle-repository-sviten (+ buildDrizzleRepositories-aggregatet) mot en
  # RIKTIG Postgres i docker (compose), inte bara pglite (WASM). Fångar driver-/
  # SQL-skillnader inför server-runtimen (#410). Grunden för server-sync-E2E (#422):
  # docker-compose.test.yml får en `server`-tjänst när #410 landar.
  repository-postgres:
    name: Repository (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Start Postgres (docker compose)
        run: docker compose -f tooling/docker/docker-compose.test.yml up -d --wait --wait-timeout 90
      - name: Repository-tester mot riktig Postgres
        env:
          PG_TEST_URL: postgres://ava:ava@localhost:5433/ava_test
        run: bun test test/unit/server/repositories/ test/unit/server/db/relations.test.ts test/unit/server/http/server-context.test.ts test/unit/server/http/server-trpc-handler.test.ts test/unit/server/sync/ test/unit/client/sync/trpc-sync-transport.test.ts test/unit/server/http/server-first-http-e2e.test.ts test/unit/server/db/server-first-deploy.test.ts test/unit/client/backend/server-first-store.test.ts
      - name: Tear down docker
        if: always()
        run: docker compose -f tooling/docker/docker-compose.test.yml down -v

  # ───────────────── Server-first (docker deploy-E2E) ─────────────────
  # Bygger server-first-binären, kör den som en RIKTIG docker-container mot
  # Postgres, applicerar schemat (db:migrate) och synkar push/pull via
  # TrpcSyncTransport över HTTP. Bevisar att den deployade artefakten fungerar
  # (grund för self-hosted server-first + #421/#422). Demon/git orörda.
  server-first-e2e:
    name: Server-first (deploy E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Bygg server-first-binär
        run: bun run server-first:build
      - name: Starta Postgres + server-first (docker)
        run: docker compose -f tooling/docker/docker-compose.server-first.yml up -d --build --wait --wait-timeout 120
      - name: Applicera schema (db:migrate)
        env:
          AVA_DATABASE_URL: postgres://ava:ava@localhost:5433/ava_test
        run: bun run db:migrate
      - name: Server-sync deploy-E2E
        env:
          SERVER_URL: http://localhost:3001
          AVA_DATABASE_URL: postgres://ava:ava@localhost:5433/ava_test
          AVA_ORGANIZATION_ID: "00000000-0000-0000-0000-000000000001"
        run: bun tooling/scripts/server-first-sync-e2e.ts
      - name: Tear down docker
        if: always()
        run: docker compose -f tooling/docker/docker-compose.server-first.yml down -v

  # ───────────────── E2E (git round-trip) ─────────────────
  # Den riktiga browser-klienten klonar/pushar mot docker-git-servern
  # (self-hosted). Auth: PAT bootstrappas av web-containern; vi exporterar
  # den som AVA_RT_GIT_PAT (clone + browser-push). 18/19 tester gröna; ett
  # PDF-extraktions-test är test.fixme (se round-trip.spec.ts).
  e2e:
    name: E2E (git round-trip)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build:demo
      # Bundle-size-budget (#14): fäll om klient-JS:en svällt över budgeten.
      # Återanvänder demo-bygget ovan (out/) — ingen extra build.
      - run: bun run size
      - run: bun run e2e:install
      - name: Start docker + hämta bootstrappad admin-PAT
        run: |
          # `--wait` gatar på web-containerns healthcheck (servar /ava/) innan
          # vi går vidare → ingen tävling mot kall runner (bootstrap + nginx upp).
          # #63: tidigare pollades loggen direkt efter `up -d`, vilket false-
          # red:ade när bootstrappen tog > 60s.
          docker compose -f tooling/docker/docker-compose.yml up -d --build --wait --wait-timeout 180
          # web-containern printar en slumpad admin-PAT EN gång vid bootstrap.
          # round-trip-testet behöver den (git-clone + browser-push) via AVA_RT_GIT_PAT.
          # När --wait passerat är containern healthy, så PAT-raden finns i loggen
          # — men behåll en retry-loop (120s) som extra marginal.
          PAT=""
          for i in $(seq 1 60); do
            PAT=$(docker compose -f tooling/docker/docker-compose.yml logs web 2>&1 \
              | grep -oE 'Admin-token:[[:space:]]+[A-Za-z0-9]{40}' | grep -oE '[A-Za-z0-9]{40}' | head -1)
            [ -n "$PAT" ] && break
            sleep 2
          done
          if [ -z "$PAT" ]; then echo "::error::Kunde inte hämta admin-PAT ur web-loggen"; docker compose -f tooling/docker/docker-compose.yml logs web; exit 1; fi
          echo "AVA_RT_GIT_PAT=$PAT" >> "$GITHUB_ENV"
          # vänta tills web servar /ava/ (redundant efter --wait, men billig säkerhet)
          for i in $(seq 1 60); do curl -sf http://localhost:8080/ava/ >/dev/null && break; sleep 2; done
      - run: bun run round-trip
      - name: Tear down docker
        if: always()
        run: docker compose -f tooling/docker/docker-compose.yml down -v
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          # round-trip-konfigen skriver till reports/playwright-round-trip/
          # (playwright.round-trip.config.ts) — INTE reports/playwright/. Fel
          # path gjorde att trace/video/HTML aldrig laddades upp vid rött bygge.
          path: reports/playwright-round-trip/

  # ───────────────── E2E (OIDC-login) ─────────────────
  # Riktig browser-inloggning mot en RIKTIG IdP (Keycloak, realm "ava" med
  # test-användare) genom oauth2-proxy-stacken (#222, ADR 0009). e2e-oidc.sh
  # bygger upp stacken (web + oauth2-proxy + keycloak), väntar in realm-import
  # + web-health, och kör Playwright-batteriet. Regressionsskydd för auth.
  e2e-oidc:
    name: E2E (OIDC login)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run e2e:install
      - run: bun run e2e:oidc
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-oidc-report
          path: reports/playwright-oidc/
