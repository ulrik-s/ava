name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch: # för on-demand e2e (git round-trip)

# Yarn (med nodeLinker: node-modules) är vad utvecklarna kör lokalt.
# Vi använder corepack i CI så att exakt samma yarn-version används.
#
# OBS: AVA är git-first — ingen Prisma, Postgres, NextAuth, Meilisearch
# eller Tika i stacken. CI speglar därför bara den faktiska stacken:
# statisk analys + vitest (+ git-round-trip-e2e mot docker).

jobs:
  # ───────────────── Statisk analys ─────────────────
  static:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn typecheck
      - run: yarn lint
      - run: yarn deps:check
      - run: yarn knip:report
      - run: yarn duplicates
      - name: Upload jscpd report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jscpd-report
          path: reports/jscpd/

  # ───────── Unit + komponent + integration ─────────
  # Allt mockar sina beroenden / kör mot in-memory DemoDataStore — inga
  # externa tjänster behövs.
  unit:
    name: Unit / komponent / integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn test:cov
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: reports/coverage/

  # ───────────────── E2E (git round-trip) ─────────────────
  # Den riktiga browser-klienten pushar mot docker-git-servern (self-hosted).
  # Tungt test (docker + headless browser-push). PAT-bootstrap fungerar i CI,
  # men själva round-trip-flödet hänger för närvarande headless (~18 min →
  # timeout) → kräver separat felsökning. Tills dess: kör ON-DEMAND
  # (workflow_dispatch eller lokalt `yarn round-trip`), inte på varje push.
  e2e:
    name: E2E (git round-trip)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn build:demo
      - run: yarn playwright install --with-deps chromium
      - name: Start docker + hämta bootstrappad admin-PAT
        run: |
          docker compose -f tooling/docker/docker-compose.yml up -d --build
          # web-containern printar en slumpad admin-PAT EN gång vid bootstrap.
          # round-trip-testet behöver den (git-clone + browser-push) via AVA_RT_GIT_PAT.
          PAT=""
          for i in $(seq 1 30); do
            PAT=$(docker compose -f tooling/docker/docker-compose.yml logs web 2>&1 \
              | grep -oE 'Admin-token:[[:space:]]+[A-Za-z0-9]{40}' | grep -oE '[A-Za-z0-9]{40}' | head -1)
            [ -n "$PAT" ] && break
            sleep 2
          done
          if [ -z "$PAT" ]; then echo "::error::Kunde inte hämta admin-PAT ur web-loggen"; docker compose -f tooling/docker/docker-compose.yml logs web; exit 1; fi
          echo "AVA_RT_GIT_PAT=$PAT" >> "$GITHUB_ENV"
          # vänta tills web servar /ava/
          for i in $(seq 1 30); do curl -sf http://localhost:8080/ava/ >/dev/null && break; sleep 2; done
      - run: yarn round-trip
      - name: Tear down docker
        if: always()
        run: docker compose -f tooling/docker/docker-compose.yml down -v
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/playwright/
