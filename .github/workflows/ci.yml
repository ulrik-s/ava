name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Yarn (med nodeLinker: node-modules) är vad utvecklarna kör lokalt.
# Vi använder corepack i CI så att exakt samma yarn-version används.
#
# OBS: AVA är git-first — ingen Prisma, Postgres, NextAuth, Meilisearch
# eller Tika i stacken. CI speglar därför bara den faktiska stacken:
# statisk analys + vitest (+ git-round-trip-e2e mot docker).

jobs:
  # ───────────────── Statisk analys ─────────────────
  static:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn typecheck
      - run: yarn lint
      - run: yarn deps:check
      - run: yarn knip:report
      - run: yarn duplicates
      - name: Upload jscpd report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jscpd-report
          path: reports/jscpd/

  # ───────── Unit + komponent + integration ─────────
  # Allt mockar sina beroenden / kör mot in-memory DemoDataStore — inga
  # externa tjänster behövs.
  unit:
    name: Unit / komponent / integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn test:cov
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: reports/coverage/

  # ───────────────── E2E (git round-trip) ─────────────────
  # Den riktiga browser-klienten pushar mot docker-git-servern (self-hosted).
  # Kräver byggd `out/` + docker-stacken uppe (se docs/architecture.md).
  # NB: omskriven från den gamla (stale) Postgres/Meili/Tika-uppsättningen —
  # validera mot första CI-körningen.
  e2e:
    name: E2E (git round-trip)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn build:demo
      - run: docker compose -f tooling/docker/docker-compose.yml up -d --build
      - run: yarn playwright install --with-deps chromium
      - run: yarn round-trip
      - name: Tear down docker
        if: always()
        run: docker compose -f tooling/docker/docker-compose.yml down -v
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/playwright/
