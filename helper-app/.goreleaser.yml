# GoReleaser-konfig för ava-helper.
#
# Trigger: tag som börjar med `helper-v` (t.ex. `helper-v1.0.0`) — så vi
# inte krockar med eventuella web-app-releaser i samma monorepo.
#
# Output: 5 binärer (mac amd64+arm64, linux amd64+arm64, win amd64) +
# en `helper-app_<VERSION>_checksums.txt`. Uppladdas som GitHub release
# under den taggen.
#
# Validering: `goreleaser release --snapshot --clean` för dry-run.

version: 2

project_name: ava-helper

# Vi sitter i en monorepo — helper-koden bor i ./helper-app/.
# main: . är default men vi specificerar för tydlighet.
builds:
  - id: ava-helper
    main: .
    binary: ava-helper
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.Version={{.Tag}}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64

archives:
  - id: default
    name_template: "ava-helper_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - service/**/*

checksum:
  name_template: "ava-helper_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: ulrik-s
    name: ava
  prerelease: auto
  name_template: "Helper {{ .Tag }}"
  header: |
    AVA Helper auto-uppdaterar sig själv en gång per dygn. Den här
    releasen plockas upp automatiskt av befintliga installationer.
  footer: |
    **Installation (ny användare):**

    macOS/Linux:
    ```
    brew install ulrik-s/ava/helper
    ```

    Windows:
    ```
    scoop install ava-helper
    ```
