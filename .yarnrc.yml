approvedGitRepositories:
  - "**"

enableScripts: true
nodeLinker: node-modules
# Notering: vi testade nodeLinker: pnpm för att spara disk via central
# .store/ med symlinks, men Prisma 7:s prisma-client-js-generator
# skriver till node_modules/.prisma/client/ vilket inte hittas under
# pnpm-linkerns .store-struktur. Migration till custom output
# (output = "../src/generated/prisma") krävs för att kunna byta.
