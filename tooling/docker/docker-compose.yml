# AVA Tier 3 — tunn backend.
#
# Arkitektur:
#   Browser (klient)
#     │
#     ├─ HTTP → nginx (port 8080)  — servar static web-app + git-http-backend
#     └─ SSH  → sshd  (port 2222)  — bare git-repos = all datalagring
#
# Klienten gör allt jobb (FSA + isomorphic-git). Servern är bara två
# tunna lager: filserver för web-app:n + git-server för data. Ingen
# databas, ingen LLM, ingen text-extraktion på serversidan.
#
# OBS: compose-filen ligger i docker/. Kör ALLTID med -f från repo-roten:
#   1. Bygg web-app:n statiskt:  DEMO_BASE_PATH=/ava bash tooling/scripts/build-demo.sh
#   2. Lägg din SSH-nyckel i:    tooling/docker/git-ssh/authorized_keys
#   3. Starta:                   docker compose -f tooling/docker/docker-compose.yml up -d --build
#   4. Browser:                  http://localhost:8080/ava
#   5. Klona repo:                git clone ssh://git@localhost:2222/srv/git/firma.git
#
# `name: ava` håller projekt-/volymnamnen stabila (ava_git_repos) oavsett
# att filen flyttats till docker/ — annars skulle de prefixas "docker_".
# Relativa sökvägar nedan är relativa docker/ (compose-filens katalog).

name: ava

services:
  # ─── Statisk web-app + smart-HTTP git-endpoint ────────────
  # nginx servar dels static under /ava/, dels git-http-backend under
  # /git/ (samma origin → ingen CORS-proxy för browser-push). Delar
  # bare-repos med git-ssh via volymen git_repos.
  #
  # Auth: nginx auth_basic på /git/ läser htpasswd ur auth_data-volymen.
  # Web-containerns entrypoint skapar en initial admin-PAT vid första
  # start om htpasswd tom (printas i loggen, en gång). Inga server-
  # processer utöver nginx + git-http-backend (båda standard, inget
  # custom kod-skikt att underhålla).
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../../out:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - git_repos:/srv/git
      - auth_data:/auth-data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/ava/"]
      interval: 10s
      # timeout 10s (var 3s): en wget kan ta >3s på en lastad CI-runner.
      timeout: 10s
      # retries 10 (var 5): tål fler transienta misslyckanden innan unhealthy.
      retries: 10
      # start_period: misslyckade checks under bootstrap (htpasswd + git-seed +
      # nginx-start) räknas INTE mot retries → containern markeras inte unhealthy
      # under uppstart, vilket annars fick `docker compose up --wait` att avbryta
      # med exit 1 i CI:s e2e-jobb (#131). Räknas inte mot --wait-timeout.
      start_period: 40s

  # ─── (Valbar) Auth-server med invite-token-UI ──────────────
  # Default off — bara för kunder som vill ha self-service-provisionering
  # via browser istället för admin-SSH. Aktivera med:
  #   docker compose --profile invite-server up -d
  # Standard: admin lägger till användare med tooling/scripts/add-user.sh.
  auth:
    profiles: ["invite-server"]
    build:
      context: ./auth-server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BOOT_SECRET: ${BOOT_SECRET:-}
      PORT: "3001"
      DATA_DIR: "/data"
    volumes:
      - auth_data:/data

  # ─── SSH + bare git-repos = datalagring ────────────────────
  git-ssh:
    build:
      context: ./git-ssh
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "2222:22"
    volumes:
      - git_repos:/srv/git
      - ./git-ssh/authorized_keys:/keys/authorized_keys:ro

  # ─── (Valbar) Server-runtime: git-peer för integrationer/påminnelser ──
  # ADR 0005 fas 2. Default OFF — bara byråer som vill ha server-drivna
  # integrationer (Fortnox #82, påminnelser) kör den; 1-mans utan
  # integrationer kör utan denna tjänst precis som förut (USP: din data,
  # ingen tredjepartsinfra).
  #
  # Aktivera:
  #   bun run server-runtime:build      # förbygg linux-binären (dist/server-runtime/)
  #   AVA_SR_ORG_ID=<org> AVA_SR_GIT_USER=<htpasswd-user> AVA_SR_GIT_TOKEN=<pat> \
  #     docker compose -f tooling/docker/docker-compose.yml --profile server up -d --build
  #
  # Auth mot firma.git: HTTP-basic (htpasswd-användare/PAT, samma som browser-
  # push). Pekar default på web-containerns /git/-endpoint i det interna nätet.
  # Fortnox-connectorn (#82) aktiveras om secrets-valvet monteras (se nedan).
  server-runtime:
    profiles: ["server"]
    build:
      context: ../..
      dockerfile: tooling/docker/server-runtime/Dockerfile
    restart: unless-stopped
    environment:
      AVA_SR_REPO_URL: ${AVA_SR_REPO_URL:-http://web/git/firma.git}
      AVA_SR_WORK_DIR: /var/lib/ava/firma
      # Obligatorisk när profilen "server" är aktiv — men använd INTE ${VAR:?}
      # här: compose interpolerar hela filen vid parse (oavsett profil), så :?
      # skulle bryta `docker compose up` även för web/git-ssh. Saknat org-id
      # fångas istället vid container-start av runtime:ns zod-validering.
      AVA_SR_ORG_ID: ${AVA_SR_ORG_ID:-}
      AVA_SR_GIT_USER: ${AVA_SR_GIT_USER:-}
      AVA_SR_GIT_TOKEN: ${AVA_SR_GIT_TOKEN:-}
      AVA_SR_POLL_INTERVAL_MS: ${AVA_SR_POLL_INTERVAL_MS:-15000}
      # Fortnox-connector (#82/#79): aktiveras när valv-env + mount finns.
      AVA_SECRETS_KEY: ${AVA_SECRETS_KEY:-}
      AVA_SECRETS_FILE: ${AVA_SECRETS_FILE:-}
    volumes:
      - server_work:/var/lib/ava
      # Montera byråns secrets-valv (utanför repo:t) för Fortnox-connectorn:
      #   - ${AVA_SECRETS_HOST_FILE:-/dev/null}:/run/ava/vault.enc:ro
    depends_on:
      - web

volumes:
  # Persistent storage för bare git-repos. Backup = `tar` på denna volym.
  git_repos:
  # Persistent storage för auth-state (htpasswd, invites). Delad mellan
  # auth-tjänsten (read/write) och web/nginx (read).
  auth_data:
  # Server-runtime:ns egen working-copy (firma.git-klon). Engångs-/cache-data
  # — kan raderas, klonas om vid nästa start.
  server_work:
