# OIDC-overlay (#222, ADR 0009) — opt-in människo-auth via oauth2-proxy,
# verifierad mot en RIKTIG IdP (Keycloak) med en test-användardatabas.
#
# Bas-stacken (docker-compose.yml) använder htpasswd. Denna overlay byter
# web-containerns nginx-config till OIDC-varianten och lägger till oauth2-proxy
# + Keycloak (realm "ava" med test-användare, importeras vid start). Aktivera:
#
#   docker compose -f tooling/docker/docker-compose.yml \
#                  -f tooling/docker/docker-compose.oidc.yml up -d --build
#
# Dual-URL (docker): Keycloak-issuer:n är den PUBLIKA URL:en (localhost:KC_PORT,
# = det browsern når), medan oauth2-proxy hämtar token/jwks/userinfo via den
# INTERNA URL:en (keycloak:8080). skip-oidc-discovery + explicita backchannel-
# URL:er löser att de två skiljer sig. I skarp drift: peka issuer + backchannel
# mot byråns riktiga IdP (Entra/Google) och ta bort keycloak-tjänsten. Se docs/auth.md.

name: ava

services:
  # Byt nginx-config till OIDC-varianten (samma target → ersätter bas-mounten).
  web:
    volumes:
      - ../../out:/usr/share/nginx/html:ro
      - ./nginx-oidc.conf:/etc/nginx/conf.d/default.conf:ro
      - git_repos:/srv/git
      - auth_data:/auth-data
    # /ava/ kräver login (302) i OIDC-läge → healthchecka /healthz (öppen 200).
    # Annars blir containern aldrig "healthy" och `compose up --wait` timeoutar.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      - oauth2-proxy

  # ─── oauth2-proxy: OIDC relying party (auth_request-backend för nginx) ──
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_PROVIDER: "keycloak-oidc"
      OAUTH2_PROXY_CLIENT_ID: "${OAUTH2_PROXY_CLIENT_ID:-ava}"
      OAUTH2_PROXY_CLIENT_SECRET: "${OAUTH2_PROXY_CLIENT_SECRET:-ava-test-secret}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET:-ava-dev-cookie-secret-0123456789}"
      OAUTH2_PROXY_REDIRECT_URL: "${OIDC_REDIRECT_URL:-http://localhost:8080/oauth2/callback}"
      # PUBLIK issuer + login-URL (det browsern når) …
      OAUTH2_PROXY_OIDC_ISSUER_URL: "${OIDC_ISSUER_PUBLIC:-http://localhost:8089/realms/ava}"
      OAUTH2_PROXY_LOGIN_URL: "${OIDC_ISSUER_PUBLIC:-http://localhost:8089/realms/ava}/protocol/openid-connect/auth"
      # … INTERN backchannel (oauth2-proxy → keycloak:8080) för token/jwks/userinfo.
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_REDEEM_URL: "http://keycloak:8080/realms/ava/protocol/openid-connect/token"
      OAUTH2_PROXY_OIDC_JWKS_URL: "http://keycloak:8080/realms/ava/protocol/openid-connect/certs"
      OAUTH2_PROXY_PROFILE_URL: "http://keycloak:8080/realms/ava/protocol/openid-connect/userinfo"
      OAUTH2_PROXY_VALIDATE_URL: "http://keycloak:8080/realms/ava/protocol/openid-connect/userinfo"
      # Auktorisering görs av AVA (allowlist i firma.git), ej av proxy:n →
      # släpp alla email-domäner; okänd email nekas ändå av OidcAuthProvider.
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: "static://202"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
    depends_on:
      - keycloak

  # ─── Keycloak: riktig OIDC-IdP med test-användardatabas (dev/test) ──────
  # Importerar realm "ava" (klient + admin/lawyer/outsider-användare) vid start.
  # KC_HOSTNAME = publik URL så token-issuer matchar det browsern + oauth2-proxy
  # validerar mot. start-dev = H2 in-memory (ingen extern DB), http tillåtet.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
      KC_HOSTNAME: "${OIDC_KC_HOSTNAME:-http://localhost:8089}"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KC_PORT:-8089}:8080"
    volumes:
      - ./keycloak/realm-ava.json:/opt/keycloak/data/import/realm-ava.json:ro
