# nginx-config för AVA static web-app.
#
# Next.js byggs med DEMO_BASE_PATH=/ava → alla asset-URLs börjar med /ava/
# men filerna ligger på rot-nivå i `out/`. Vi använder `alias` för att
# mappa URL-prefixet → katalog:n.

server {
  listen 80;
  server_name _;

  index index.html;

  # .mjs (t.ex. PDF.js-workern) saknas i nginx mime.types → serveras annars
  # som application/octet-stream, och browsern VÄGRAR köra det som ES-modul
  # ("Failed to fetch dynamically imported module"). Tvinga JS-MIME.
  # Regex-location → högre prioritet än prefix-location:en nedan.
  location ~ ^/ava/_next/static/(.+\.mjs)$ {
    alias /usr/share/nginx/html/_next/static/$1;
    default_type application/javascript;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # /ava/_next/static/ — Next.js hash:ade chunks, cache aggressivt
  location /ava/_next/static/ {
    alias /usr/share/nginx/html/_next/static/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Allt under /ava/ — strippa prefix, serva static, fall till .html
  # Notera: /ava/ → index.html, /ava/foo → /foo eller /foo.html eller /foo/index.html
  location /ava/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri.html $uri/index.html /index.html =404;
  }

  # Root → redirect till /ava/
  location = / {
    return 302 /ava/;
  }

  # ─── Smart-HTTP git (git-http-backend via fcgiwrap) ───────────────
  # Browser-klienten (isomorphic-git) klonar/pushar mot localhost:8080/git/
  # — samma origin som /ava/, så ingen CORS-proxy behövs. Bare-repos
  # ligger under /srv/git (delad volym med git-ssh-servicen).
  #
  # Regex-location → högre prioritet än prefix-locations ovan. Måste ligga
  # FÖRE dotfile-deny:n (annars riskerar /git/firma.git/... att nekas, även
  # om sökvägen normalt inte innehåller "/.").
  location ~ ^/git(/.*)?$ {
    # CORS först (måste vara på preflight innan auth_basic kickar in).
    add_header Access-Control-Allow-Origin "$http_origin" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Expose-Headers "Content-Type, Content-Length, WWW-Authenticate" always;
    if ($request_method = OPTIONS) {
      return 204;
    }

    # ── Auth-gate ──
    # Klienten skickar PAT som Basic-auth-password (Authorization-header).
    # htpasswd-filen skrivs av auth-tjänsten (volume auth_data) och läses
    # här. Användare som inte finns → 401 → AVA-app omdirigerar till /setup.
    auth_basic "AVA";
    auth_basic_user_file /auth-data/htpasswd;

    fastcgi_pass unix:/var/run/fcgiwrap.socket;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /usr/libexec/git-core/git-http-backend;
    fastcgi_param GIT_PROJECT_ROOT /srv/git;
    fastcgi_param GIT_HTTP_EXPORT_ALL "";
    fastcgi_param PATH_INFO $1;
    # Skicka REMOTE_USER så git kan korrelera commits → registrerad user.
    fastcgi_param REMOTE_USER $remote_user;
    # Push av stora pack-filer: ingen body-gräns + generös timeout.
    client_max_body_size 0;
    fastcgi_read_timeout 300;
    fastcgi_buffering off;
  }

  # ─── Auth-server: provisioning / invites (öppen, men token-gated) ───
  # Sätter ingen auth_basic här eftersom auth-server SJÄLV verifierar
  # bootstrap-secret / invite-token / admin-PAT i body:n. Endpoints:
  #   GET  /auth/status
  #   POST /auth/bootstrap
  #   POST /auth/invite
  #   POST /auth/redeem-invite
  # Auth-server proxy. Använder runtime-DNS via variabel + resolver så att
  # nginx INTE kraschar vid boot om auth-tjänsten är offline (profilen
  # invite-server är opt-in). Vid request returneras 502 om auth saknas,
  # vilket app:en hanterar via probeAuthServer-fallback.
  resolver 127.0.0.11 ipv6=off valid=30s;
  location ~ ^/auth(/.*)?$ {
    add_header Access-Control-Allow-Origin "$http_origin" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
    set $auth_upstream "http://auth:3001";
    proxy_pass $auth_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # ─── Dynamiska detaljrutter (SPA-fallback för godtyckliga id:n) ───
  # Static export genererar bara /<route>/[id] för build-time-kända id:n.
  # I self-hosted-läget skapar användaren NYA poster → servera route:ns
  # sentinel-shell (__shell__) så klientens useRouteId() kan läsa id:t ur
  # URL:en (här bevaras URL:en — ingen #orig-hash behövs, till skillnad från
  # GH-Pages-404-shimmen). Försök först en ev. statiskt genererad id-sida,
  # annars shell:en. Route-listan MÅSTE matcha SHELL-arrayen i build-demo.sh.
  # `(/edit)?` hanterar den nästlade routen /templates/<id>/edit/ → faller
  # tillbaka på /templates/__shell__/edit/ (useRouteId(1) läser id:t).
  location ~ "^/ava/(matters|contacts|invoices|payment-plans|users|templates)/([^/]+)(/edit)?/?$" {
    alias /usr/share/nginx/html/;
    try_files /$1/$2$3/index.html /$1/__shell__$3/index.html /index.html =404;
  }

  # Hindra dolda dot-files (gäller ej /git/ ovan — regex-ordning styr)
  location ~ /\. {
    deny all;
  }
}
