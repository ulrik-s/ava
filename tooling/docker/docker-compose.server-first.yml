# Server-first-stack (#410, ADR 0016) — Postgres + server-first-runtimen, för
# lokal körning + CI:s server-sync-E2E. Migrera först (`bun run db:migrate` mot
# den exponerade porten) — binären bär ingen migrations-SQL.
#
#   bun run server-first:build
#   docker compose -f tooling/docker/docker-compose.server-first.yml up -d --build --wait
#   AVA_DATABASE_URL=postgres://ava:ava@localhost:5433/ava_test bun run db:migrate
#   # → server-first lyssnar på localhost:3001 (X-Auth-Request-Email-grindat)

name: ava-server-first

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ava
      POSTGRES_PASSWORD: ava
      POSTGRES_DB: ava_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ava -d ava_test"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

  server-first:
    build:
      context: ../..
      dockerfile: tooling/docker/server-first/Dockerfile
    environment:
      AVA_DATABASE_URL: postgres://ava:ava@postgres:5432/ava_test
      AVA_ORGANIZATION_ID: "${AVA_ORGANIZATION_ID:-00000000-0000-0000-0000-000000000001}"
      AVA_HTTP_HOST: 0.0.0.0
      AVA_HTTP_PORT: "3001"
      # Dokument-bytes på disk (#518 Fas 1) — krävs för server-LLM-klassificering.
      AVA_CONTENT_DIR: /data/content
      # Server-LLM-klassificering (#518 Fas 3): sätts BARA när llm-profilen körs
      # (annars faller jobbet tillbaka på filnamns-heuristik). Pekar på ollama nedan.
      AVA_LLM_ENDPOINT: "${AVA_LLM_ENDPOINT:-}"
      AVA_LLM_MODEL: "${AVA_LLM_MODEL:-}"
    volumes:
      - content_repo:/data/content
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── (Valbar) Lokal LLM för dokumentklassificering (#518) ──────────
  # Default off — dra in med `docker compose --profile llm up`. Sätt sedan
  #   AVA_LLM_ENDPOINT=http://ollama:11434/v1  AVA_LLM_MODEL=llama3.2
  # på server-first-tjänsten (env ovan läser dem). Modellen dras ner i
  # containern (ingen klient-nedladdning). Ollama exponerar ett
  # OpenAI-kompatibelt API på /v1.
  ollama:
    profiles: ["llm"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

volumes:
  content_repo:
  ollama_models:
