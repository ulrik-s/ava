# nginx-demo — speglar GitHub Pages-beteendet lokalt så vi kan testa
# demo-bygget utan att deploya.
#
# Skillnad mot vanliga nginx.conf:n: vid 404 servar vi /404.html istället
# för /index.html — precis som GH Pages gör. Det är skillnaden som
# triggar SPA-fallback-skriptet i 404.html.
#
# Användning:
#   bash tooling/scripts/demo-serve.sh
#   → bygger out/ + startar denna nginx på localhost:8080
#   → öppna http://localhost:8080/ava/

server {
  listen 80;
  server_name _;
  index index.html;

  # /ava/_next/static/ — Next:s hashade chunks
  location /ava/_next/static/ {
    alias /usr/share/nginx/html/_next/static/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # /ava/ — strippa prefix, servera static, fall till 404.html (GH-Pages-stil)
  location /ava/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/index.html /404.html =404;
  }

  # Root → redirect till /ava/
  location = / {
    return 302 /ava/;
  }
}
