# Test-/coverage-konfig för helper-ui (Electron-skal + in-process-motor,
# ADR 0030). Coverage-grind = ratchet.
[test]
coverage = true
coverageReporter = ["text"]
coverageSkipTestFiles = true
# Mät helper-ui:s egen logik (inkl. motorn i src/engine/): hoppa över det delade
# repo-lagret (../src — mäts av huvud-repot), entry-/wiring-filerna (main.ts,
# verifieras vid körning/paketering) och test-fixturer.
coveragePathIgnorePatterns = ["../src/**", "**/main.ts", "**/helpers.ts"]
coverageThreshold = { line = 0.90, function = 0.85 }
